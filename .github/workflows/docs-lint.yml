name: docs-lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: docs-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: i18n parity (ES ↔ EN)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check page parity
        run: node scripts/check-parity.js

  screenshot-age:
    name: Screenshot freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check screenshot age (<90 days)
        run: node scripts/check-screenshots-age.js

  image-budget:
    name: Image byte budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce ≤200KB per PNG / WebP
        shell: bash
        run: |
          MAX=204800
          fail=0
          while IFS= read -r f; do
            size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
            if [ "$size" -gt "$MAX" ]; then
              echo "  ✗ $f is $size bytes (>$MAX)"
              fail=1
            fi
          done < <(find images -type f \( -iname '*.png' -o -iname '*.webp' -o -iname '*.jpg' -o -iname '*.jpeg' \) 2>/dev/null)
          if [ "$fail" = "1" ]; then exit 1; fi
          echo "✓ all images within byte budget"

  vale:
    name: Vale (vocab)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vale
        run: |
          curl -sL https://github.com/errata-ai/vale/releases/download/v3.0.7/vale_3.0.7_Linux_64-bit.tar.gz | tar -xz -C /usr/local/bin vale
      - name: Run Vale on EN content
        run: vale en/ || (echo "✗ Vale found banned vocabulary in EN — see DESIGN.md and glossary.md" && exit 1)
      - name: Run Vale on ES content
        run: vale es/ || (echo "✗ Vale found banned vocabulary in ES — see DESIGN.md y glossary.md" && exit 1)

  schema:
    name: Mintlify schema + broken-links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Mintlify CLI
        run: npm install -g mintlify
      - name: Validate docs.json schema
        run: mintlify docs.json
        continue-on-error: true # Mintlify CLI may not support a `validate` subcommand on all versions; fallback below.
      - name: Check broken internal links
        run: mintlify broken-links || (echo "✗ broken internal links" && exit 1)

  external-links:
    name: External link check (weekly only)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 5 --exclude-mail './**/*.mdx'

  glossary:
    name: Glossary consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid stale terms
        shell: bash
        run: |
          fail=0
          # Renamed terms — must not appear in current docs.
          STALE_TERMS_EN=("Memory" "Campaigns")
          STALE_TERMS_ES=("Memoria" "Campañas")
          for term in "${STALE_TERMS_EN[@]}"; do
            if grep -rn --include='*.mdx' -w "$term" en/ ; then
              echo "  ✗ EN stale term '$term' found — should be 'Conocimiento' / 'Entrevistas IA'"
              fail=1
            fi
          done
          # NOTE: ES uses Spanish names for these concepts ("Conocimiento", "Entrevistas IA") —
          # we don't ban the Spanish ORIGINAL words globally, only when used as the old
          # product feature name. This check is intentionally minimal in Phase 1.
          if [ "$fail" = "1" ]; then exit 1; fi
          echo "✓ no stale terms"

  pricing-sync:
    name: Pricing in sync with plans.ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need kb2b sibling for sync-pricing.js to find plans.ts.
          # In CI, this assumes kb2b-docs and kb2b live in the same org;
          # adjust path below if your CI checkout differs.
          repository: smtx/kb2b-docs
      - name: Checkout sibling kb2b
        uses: actions/checkout@v4
        with:
          repository: smtx/kb2b
          path: ../kb2b
          token: ${{ secrets.KB2B_READ_TOKEN }} # PAT with read access to private kb2b repo
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check pricing drift
        run: |
          if [ -d ../kb2b ]; then
            node scripts/sync-pricing.js --check
          else
            echo "⚠ kb2b sibling not available in CI — skipping pricing drift check"
          fi

  done:
    name: All gates green
    needs: [parity, screenshot-age, image-budget, vale, schema, glossary, pricing-sync]
    runs-on: ubuntu-latest
    steps:
      - run: echo "✓ all gates green — ready to merge"
