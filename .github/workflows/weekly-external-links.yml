name: weekly-external-links

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    name: Crawl external links + open issue on failures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lychee link check
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 5 --exclude-mail --exclude 'localhost' './**/*.mdx'
          fail: false # we want to open an issue, not fail the cron
      - name: Open issue if broken links found
        if: ${{ steps.lychee.outputs.exit_code != 0 }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Weekly external link check — broken links found'
          content-filepath: ./lychee/out.md
          labels: docs, broken-links
